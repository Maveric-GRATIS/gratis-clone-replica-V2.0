# Firebase App Hosting Configuration
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Use the nginx server from Dockerfile
  # Don't override the CMD - let Dockerfile handle it
  cpu: 1
  memoryMiB: 512
  maxInstances: 20
  minInstances: 0
  concurrency: 80

env:
  - variable: PORT
    value: "8080"
