# ============================================================================
# GRATIS.NGO — Docker Compose (Local Development)
# ============================================================================

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - gratis-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gratis-network
    command: redis-server --appendonly yes

volumes:
  redis-data:
    driver: local

networks:
  gratis-network:
    driver: bridge
